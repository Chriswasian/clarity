{% extends 'base.html' %}
{% block title %}Edit Entry - Clarity - Balance your worlds{% endblock %}
{% block content %}
<br><br>
<form method="POST">

    <label>Mood (1-10)</label>
    <br>
    <input type="number" name="mood" min="1" max="10" value="{{ entry.mood }}">
    <br><br>
    <label>Mode</label>
    <br>
    <select name="mode">
        <option value="work" {% if entry.mode=='work' %}selected{% endif %}>work</option>
        <option value="personal" {% if entry.mode=='personal' %}selected{% endif %}>personal</option>
    </select>
    <br><br>
    <label>What's on your mind?</label>
    <br>
    <textarea name="content">{{ entry.content }}</textarea>
    <br><br>
    <button type="submit">Save Changes</button>

</form>
{% endblock %}
